<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livros</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="../index.html">
                <i class="bi bi-book fs-4 me-2"></i>
                Biblioteca
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu"
                aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="../index.html"><i class="bi bi-house"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="livros.html"><i class="bi bi-journal-bookmark"></i> Livros</a></li>
                    <li class="nav-item"><a class="nav-link" href="usuarios.html"><i class="bi bi-people"></i> Usuários</a></li>
                    <li class="nav-item"><a class="nav-link" href="emprestimos.html"><i class="bi bi-journal-arrow-up"></i> Empréstimos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="topbar">
            <h1>Gerenciamento de Livros</h1>
        </div>

        <div class="form-container">
            <h2>Cadastrar Livro</h2>

            <input type="text" id="titulo" class="form-control mb-3" placeholder="Título">
            <input type="text" id="autor" class="form-control mb-3" placeholder="Autor">
            <select id="categoria" class="form-select mb-3" onchange="toggleCategoriaOutro()">
                <option value="">Selecione a categoria</option>
                <option value="Ficção">Ficção</option>
                <option value="Não-ficção">Não-ficção</option>
                <option value="Romance">Romance</option>
                <option value="Fantasia">Fantasia</option>
                <option value="Biografia">Biografia</option>
                <option value="Infantil">Infantil</option>
                <option value="Outros">Outros</option>
            </select>
            <input type="text" id="categoriaOutro" class="form-control mb-3 d-none" placeholder="Digite a categoria">
            <input type="number" id="ano" class="form-control mb-3" placeholder="Ano">
            <input type="number" id="quantidade" class="form-control mb-3" placeholder="Quantidade">

            <button type="button" class="btn btn-success btn-cadastrar" onclick="cadastrarLivro()">
                Cadastrar
            </button>

            <div id="mensagemLivro" class="mt-3"></div>
        </div>

        <div class="table-container">
            <h2>Lista de Livros</h2>

            <table class="table table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Categoria</th>
                        <th>Ano</th>
                        <th>Quantidade</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelaLivros">
                </tbody>
            </table>
        </div>

        <!-- Modal de edição de livro -->
        <div class="modal fade" id="editLivroModal" tabindex="-1" aria-labelledby="editLivroModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="editLivroModalLabel">Editar Livro</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="editarLivroId">
                        <div class="mb-3">
                            <label for="editarTitulo" class="form-label">Título</label>
                            <input type="text" id="editarTitulo" class="form-control" placeholder="Título">
                        </div>
                        <div class="mb-3">
                            <label for="editarAutor" class="form-label">Autor</label>
                            <input type="text" id="editarAutor" class="form-control" placeholder="Autor">
                        </div>
                        <div class="mb-3">
                            <label for="editarCategoria" class="form-label">Categoria</label>
                            <select id="editarCategoria" class="form-select" onchange="toggleCategoriaOutroModal()">
                                <option value="">Selecione a categoria</option>
                                <option value="Ficção">Ficção</option>
                                <option value="Não-ficção">Não-ficção</option>
                                <option value="Romance">Romance</option>
                                <option value="Fantasia">Fantasia</option>
                                <option value="Biografia">Biografia</option>
                                <option value="Infantil">Infantil</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>
                        <div class="mb-3 d-none" id="editarCategoriaOutroWrapper">
                            <label for="editarCategoriaOutro" class="form-label">Outra categoria</label>
                            <input type="text" id="editarCategoriaOutro" class="form-control" placeholder="Digite a categoria">
                        </div>
                        <div class="mb-3">
                            <label for="editarAno" class="form-label">Ano</label>
                            <input type="number" id="editarAno" class="form-control" placeholder="Ano">
                        </div>
                        <div class="mb-3">
                            <label for="editarQuantidade" class="form-label">Quantidade</label>
                            <input type="number" id="editarQuantidade" class="form-control" placeholder="Quantidade">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary" onclick="salvarEdicaoLivro()">Salvar alterações</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>

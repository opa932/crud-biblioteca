<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empréstimos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="../index.html">
                <i class="bi bi-book fs-4 me-2"></i>
                Biblioteca
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu"
                aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="../index.html"><i class="bi bi-house"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="livros.html"><i class="bi bi-journal-bookmark"></i> Livros</a></li>
                    <li class="nav-item"><a class="nav-link" href="usuarios.html"><i class="bi bi-people"></i> Usuários</a></li>
                    <li class="nav-item"><a class="nav-link" href="emprestimos.html"><i class="bi bi-journal-arrow-up"></i> Empréstimos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="topbar">
            <h1>Gerenciamento de Empréstimos</h1>
        </div>

        <div class="form-container">
            <h2>Registrar Empréstimo</h2>

            <select id="livroEmprestimo" class="form-select mb-3">
                <option value="">Selecione um livro</option>
            </select>

            <select id="usuarioEmprestimo" class="form-select mb-3">
                <option value="">Selecione um usuário</option>
            </select>

            <input type="date" id="dataEmprestimo" class="form-control mb-3" placeholder="Data de Empréstimo">
            <input type="date" id="dataDevolucao" class="form-control mb-3" placeholder="Data de Devolução">

            <button class="btn btn-success btn-cadastrar" onclick="registrarEmprestimo()">
                Registrar
            </button>
        </div>

        <div class="table-container">
            <h2>Lista de Empréstimos</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Livro</th>
                        <th>Usuário</th>
                        <th>Data Empréstimo</th>
                        <th>Data Devolução</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelaEmprestimos">
                </tbody>
            </table>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>

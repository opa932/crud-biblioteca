<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="../index.html">
                <i class="bi bi-book fs-4 me-2"></i>
                Biblioteca
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu"
                aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="../index.html"><i class="bi bi-house"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="livros.html"><i class="bi bi-journal-bookmark"></i> Livros</a></li>
                    <li class="nav-item"><a class="nav-link" href="usuarios.html"><i class="bi bi-people"></i> Usuários</a></li>
                    <li class="nav-item"><a class="nav-link" href="emprestimos.html"><i class="bi bi-journal-arrow-up"></i> Empréstimos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="topbar">
            <h1>Gerenciamento de Usuários</h1>
        </div>

        <div class="form-container">
            <h2>Cadastrar Usuário</h2>

            <input type="text" id="nome" class="form-control mb-3" placeholder="Nome">
            <input type="email" id="email" class="form-control mb-3" placeholder="Email">
            <input type="text" id="telefone" class="form-control mb-3" placeholder="Telefone">
            <input type="text" id="endereco" class="form-control mb-3" placeholder="Endereço">

            <button class="btn btn-success btn-cadastrar" onclick="cadastrarUsuario()">
                Cadastrar
            </button>

            <div id="mensagemUsuario" class="mt-3"></div>
        </div>

        <div class="table-container">
            <h2>Lista de Usuários</h2>

            <table class="table table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th>Endereço</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelaUsuarios">
                </tbody>
            </table>
        </div>

        <!-- Modal de edição de usuário -->
        <div class="modal fade" id="editUsuarioModal" tabindex="-1" aria-labelledby="editUsuarioModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="editUsuarioModalLabel">Editar Usuário</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="editarUsuarioId">
                        <div class="mb-3">
                            <label for="editarNome" class="form-label">Nome</label>
                            <input type="text" id="editarNome" class="form-control" placeholder="Nome">
                        </div>
                        <div class="mb-3">
                            <label for="editarEmail" class="form-label">Email</label>
                            <input type="email" id="editarEmail" class="form-control" placeholder="Email">
                        </div>
                        <div class="mb-3">
                            <label for="editarTelefone" class="form-label">Telefone</label>
                            <input type="text" id="editarTelefone" class="form-control" placeholder="Telefone">
                        </div>
                        <div class="mb-3">
                            <label for="editarEndereco" class="form-label">Endereço</label>
                            <input type="text" id="editarEndereco" class="form-control" placeholder="Endereço">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary" onclick="salvarEdicaoUsuario()">Salvar alterações</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>

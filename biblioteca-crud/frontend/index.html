<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca CRUD</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-book fs-4 me-2"></i>
                Biblioteca
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu"
                aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/livros.html"><i class="bi bi-journal-bookmark"></i> Livros</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/usuarios.html"><i class="bi bi-people"></i> Usuários</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/emprestimos.html"><i class="bi bi-journal-arrow-up"></i> Empréstimos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="topbar">
            <h1>Sistema Biblioteca</h1>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Total de Livros</h3>
                <p id="totalLivros">0</p>
            </div>

            <div class="card">
                <h3>Total de Usuários</h3>
                <p id="totalUsuarios">0</p>
            </div>
        </div>

        <div class="chart-card">
            <h3>Visão Geral da Biblioteca</h3>
            <canvas id="dashboardChart" height="220"></canvas>
        </div>

        <div class="welcome-card">
            <h2>Bem-vindo ao Sistema</h2>
            <p>
                Gerencie livros e usuários da biblioteca.
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
